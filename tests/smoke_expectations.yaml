longitudinal_mixed_anova:
  data_type: longitudinal
  between_factors: [group]
  factor2_col: null
  control_group: Control
  expected_analysis_status: ready
  expected_recommended_method: mixed_anova
  expected_recommended_engine: pingouin
  expected_used_method: mixed_anova
  omnibus_should_exist: true
  expected_omnibus_terms: [Group, Time, Interaction]
  posthoc_should_exist: true
  star_map_min_count: 1
  expected_omnibus_effect_metric: partial_eta_squared
  expected_pairwise_effect_metric: hedges_g

longitudinal_mixedlm:
  data_type: longitudinal
  between_factors: [group, sex]
  factor2_col: sex
  control_group: Control
  expected_analysis_status: ready
  expected_recommended_method: mixedlm
  expected_recommended_engine: statsmodels
  expected_used_formula_contains:
    - C(time)
    - C(group)
    - C(sex)
  omnibus_should_exist: false
  fixed_effects_should_exist: true
  contrast_table_should_exist: true
  star_map_min_count: 1
  expected_effect_metric: beta_se_ci
  expected_fallback_reason_contains:
    - Pingouin mixed_anova() supports only one between-subject factor

