blocked_unbalanced_repeated:
  data_type: longitudinal
  between_factors: [group]
  factor2_col: null
  control_group: Control
  expected_recommended_method: mixedlm
  expected_recommended_engine: statsmodels
  expected_analysis_status_any_of: [ready, blocked]
  omnibus_should_exist: false
  expected_fallback_reason_contains:
    - missing or unbalanced repeated
  notes: >
    This dataset is primarily for selector fallback validation.
    The important assertion is that unbalanced repeated cells route to MixedLM.
    Final model fit may be unstable depending on optimizer behavior and should not be treated as the main pass/fail criterion.
