cross_one_way_anova:
  data_type: cross
  between_factors: [group]
  factor2_col: null
  control_group: G1
  expected_analysis_status: ready
  expected_recommended_method: one_way_anova
  expected_recommended_engine: pingouin
  expected_used_method: one_way_anova
  omnibus_should_exist: true
  expected_omnibus_terms: [group]
  posthoc_should_exist: true
  star_map_min_count: 1
  expected_omnibus_effect_metric: omega_squared
  expected_pairwise_effect_metric: hedges_g

